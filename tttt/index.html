    <div class="my_container" style="text-align: center;">
<h2>HTML Form Example</h2>
    <form action="about.html" method="get">
        <label for="name">name:</label>
        <input type="text" id="name" name="name" placeholder="enter your name" required>
        <br>
        <br>
        <label for="email">email:</label>
        <input type="email" id="email" name="email" placeholder="enter your name" required>
        <br>
        <br>
        <label for="mobile number">mobile no:</label>
        <input type="tel" id="phone" pattern="[0-9]{10}" maxlength="10" title="enter exactly 10 digits" placeholder="mobile number" ><br>
        <small>(10 digits only)</small>
        <br>
        <br>
        <label for="dob">date of birth:</Data></label>
        <input type="date" id="dob" name="dob" maxlength="2007-08-30" placeholder="dob" required>
        <br>
        <br>
        <label for="gender">gender:</label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">other</label>
        <br>
        <br>
        <label for="message">message:</label>
        <textarea id="message" name="message" rows="4" cols="25" placeholder="write your message" required></textarea>
        <br>
        <br>
        <label for="address">address:</label>
        <input type="text" id="address" name="address">
        <br>
        <br>
        <label for="country">country</label>
        <select id="country" name="country" required>
            <option value="select">select</option>
        <option value="india">india</option>
        <option value="uk">uk</option>
        <option value="usa">usa</option>
        <option value="dubai">dubai</option>
    </select>
        <br>
        <br>
        <input type="submit" value="submit">
        <input type="Reset" value="Reset">
    </form>
</div>
</body>
