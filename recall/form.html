<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .form{
    border: 2px solid black;
    width: 300px;
    padding: 50px;
    border-radius: 10px;
    margin:190px ;
   
}
    </style>
</head>
<body>
    <form class="form">
        <label for="name">Name:</label>
        <input type="name" id="name" name="name" placeholder="enter your name">
        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="enter your email">
        <br>
        <br>
        <label for="mobile no">mobile no:</label>
        <input type="tel" id="phone" name="mobile no" pattern="[0,9]{10}" maxlength="10" placeholder="enter your mobile no"><br>
        <small>(10 digits only)</small>
        <br>
        <br>
        <label for="message">message</label>
        <textarea id="message" name="message" name="message" placeholder="enter your message"></textarea>
        <br>
        <br>
        <label for="dob">date of birth</date></label>
        <input type="date" id="dob" name="date of birth"  maxlength="2002-01-02" placeholder="dob">
        <br>
        <br>
        <label for="address">address</label>
        <input type="text" id="address" name="address" placeholder="address">
        <br>
        <br>
        <label for="gender">gender</label>
        <input type="radio" id="gender" name="gender" value="male">
        <label for="male">male</label>
        <input type="radio" id="gender" name="gender" value="female">
        <label for="female">female</label>
        <input type="radio" id="gender" name="gender" value="others">
        <label for="others">others</label>
        <br>
        <br>
        <label for="country">country</label>
        <select id="country" name="country">
        <option value="india">india</option>
        <option value="us">us</option>
        <option value="dubai">dubai</option>
        <option value="america">america</option>
        <option value="andaman">andaman</option>
        </select>
        <br>
        <br>
        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </form>
</body>
</html>
